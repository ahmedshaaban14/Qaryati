services:
  - type: web
    name: qaryati
    runtime: dotnet
    runtimeVersion: "8"
    buildCommand: "dotnet publish -c Release -o /app"
    startCommand: "dotnet /app/Qaryati.dll"
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: "http://0.0.0.0:${PORT}"
    healthCheckPath: /
